<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insurance Simulator — Entity Relationship Diagram</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --pk: #facc15;
    --fk: #a78bfa;
    --enum: #34d399;
    --check: #fb923c;
    --line-user: #38bdf8;
    --line-wallet: #a78bfa;
    --line-product: #34d399;
    --line-policy: #fb923c;
    --line-claim: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: auto;
  }
  h1 {
    text-align: center;
    padding: 24px 0 8px;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
    font-size: 0.78rem;
  }
  .legend span {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .canvas-wrapper {
    width: 100%;
    overflow: auto;
    padding: 0 20px 40px;
  }
  svg {
    display: block;
    margin: 0 auto;
  }
  /* Table styles inside SVG via foreignObject */
  .erd-table {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 11px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .erd-table .header {
    background: linear-gradient(135deg, #1e40af, #7c3aed);
    color: #fff;
    font-weight: 700;
    font-size: 12px;
    padding: 7px 10px;
    text-align: center;
    letter-spacing: 0.03em;
  }
  .erd-table.standalone .header {
    background: linear-gradient(135deg, #475569, #64748b);
  }
  .erd-table table {
    width: 100%;
    border-collapse: collapse;
  }
  .erd-table td {
    padding: 3px 8px;
    border-top: 1px solid var(--border);
    white-space: nowrap;
    color: var(--text);
  }
  .erd-table tr:hover td {
    background: rgba(56,189,248,0.06);
  }
  .erd-table .col-name { font-weight: 600; min-width: 110px; }
  .erd-table .col-type { color: var(--muted); min-width: 95px; }
  .erd-table .col-badge { text-align: right; min-width: 30px; }
  .badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .badge-pk { background: rgba(250,204,21,0.18); color: var(--pk); }
  .badge-fk { background: rgba(167,139,250,0.18); color: var(--fk); }
  .badge-uk { background: rgba(56,189,248,0.18); color: var(--accent); }
  .badge-enum { background: rgba(52,211,153,0.15); color: var(--enum); }
  .badge-ck { background: rgba(251,146,46,0.18); color: var(--check); }
  .badge-idx { background: rgba(148,163,184,0.15); color: var(--muted); }
  .badge-nn { background: rgba(248,113,113,0.15); color: #f87171; }

  /* Relationship lines */
  .rel-line { stroke-width: 1.5; fill: none; opacity: 0.5; }
  .rel-line:hover { opacity: 1; stroke-width: 2.5; }
  .rel-label {
    font-size: 9px;
    fill: var(--muted);
    font-weight: 600;
  }
  marker path { stroke: none; }
</style>
</head>
<body>
<h1>Insurance Simulator — ERD</h1>
<p class="subtitle">11 models &bull; 8 enums &bull; 11 indexes &bull; SPEC Section 6.2</p>
<div class="legend">
  <span><span class="dot" style="background:var(--pk)"></span> Primary Key</span>
  <span><span class="dot" style="background:var(--fk)"></span> Foreign Key</span>
  <span><span class="dot" style="background:var(--accent)"></span> Unique</span>
  <span><span class="dot" style="background:var(--enum)"></span> Enum</span>
  <span><span class="dot" style="background:var(--check)"></span> Check Constraint</span>
</div>
<div class="canvas-wrapper">
<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="1340" viewBox="0 0 1520 1340">
<defs>
  <marker id="arrow-one" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="var(--muted)" opacity="0.6"/></marker>
  <marker id="arrow-many" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto"><path d="M10,0 L0,4 L10,8 M0,4 L10,4" stroke="var(--muted)" fill="none" stroke-width="1.2" opacity="0.6"/></marker>
</defs>
